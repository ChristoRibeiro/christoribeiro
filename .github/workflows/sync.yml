name: sync portfolio

# Pulls the Notion "Portfolio" DB → data.json, regenerates README + site + CLI,
# and commits if anything changed.
#
# One-time setup:
#   1. Notion → Settings → Connections → develop your own integration → create an
#      internal integration, copy its token.
#   2. Open the Portfolio database in Notion → ••• → Connections → add that integration.
#   3. GitHub repo → Settings → Secrets and variables → Actions → new secret
#      NOTION_TOKEN = the integration token.

on:
  workflow_dispatch: # manual "Run workflow" button in the Actions tab
  schedule:
    - cron: "0 6 * * *" # daily, 06:00 UTC
  repository_dispatch:
    types: [sync-portfolio] # fired by a webhook (e.g. a Notion button/automation)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Pull from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/pull-notion.mjs

      - name: Regenerate surfaces
        run: node scripts/generate.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "portfolio-sync"
            git config user.email "actions@users.noreply.github.com"
            git add -A
            git commit -m "chore: sync portfolio from Notion"
            git push
          else
            echo "no changes"
          fi
